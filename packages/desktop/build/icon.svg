      <stop offset="0%"   stop-color="#000000" stop-opacity="1"/>
      <stop offset="38%"  stop-color="#000000" stop-opacity="0.96"/>
      <stop offset="54%"  stop-color="#000000" stop-opacity="0.72"/>
      <stop offset="68%"  stop-color="#000000" stop-opacity="0.38"/>
      <stop offset="80%"  stop-color="#000000" stop-opacity="0.10"/>
